name: x-clone

services:
  postgres:
    image: postgres:17-alpine
    container_name: x-clone-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: x-clone-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-management
    container_name: x-clone-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: x-clone-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5

  opensearch:
    image: opensearchproject/opensearch:2.19.1
    container_name: x-clone-opensearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: DevAdmin123!
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200 >/dev/null || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.19.1
    container_name: x-clone-opensearch-dashboards
    restart: unless-stopped
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    depends_on:
      opensearch:
        condition: service_healthy
    ports:
      - "5601:5601"

  api-gateway:
    profiles: ["apps"]
    build:
      context: .
      dockerfile: ./apps/api-gateway/Dockerfile
    container_name: x-clone-api-gateway
    restart: unless-stopped
    environment: &default-service-env
      NODE_ENV: development
      HOST: 0.0.0.0
      LOG_LEVEL: info
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/api_gateway
      AUTH_SERVICE_URL: http://auth-service:4001
      USER_SERVICE_URL: http://user-service:4002
      POST_SERVICE_URL: http://post-service:4004
      INTERNAL_SERVICE_SECRET: dev-internal-service-secret
      NOTIFICATION_SERVICE_URL: http://notification-service:4006
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio123
      S3_BUCKET: x-clone-dev
      OPENSEARCH_URL: http://opensearch:9200
    depends_on: &default-service-deps
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    ports:
      - "4000:4000"

  auth-service:
    profiles: ["apps"]
    build:
      context: .
      dockerfile: ./apps/auth-service/Dockerfile
    container_name: x-clone-auth-service
    restart: unless-stopped
    environment:
      <<: *default-service-env
      PORT: 4001
      SERVICE_NAME: auth-service
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/auth_service
    depends_on: *default-service-deps
    ports:
      - "4001:4001"

  user-service:
    profiles: ["apps"]
    build:
      context: .
      dockerfile: ./apps/user-service/Dockerfile
    container_name: x-clone-user-service
    restart: unless-stopped
    environment:
      <<: *default-service-env
      PORT: 4002
      SERVICE_NAME: user-service
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/user_service
    depends_on: *default-service-deps
    ports:
      - "4002:4002"

  social-graph-service:
    profiles: ["apps"]
    build:
      context: .
      dockerfile: ./apps/social-graph-service/Dockerfile
    container_name: x-clone-social-graph-service
    restart: unless-stopped
    environment:
      <<: *default-service-env
      PORT: 4003
      SERVICE_NAME: social-graph-service
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/social_graph_service
    depends_on: *default-service-deps
    ports:
      - "4003:4003"

  post-service:
    profiles: ["apps"]
    build:
      context: .
      dockerfile: ./apps/post-service/Dockerfile
    container_name: x-clone-post-service
    restart: unless-stopped
    environment:
      <<: *default-service-env
      PORT: 4004
      SERVICE_NAME: post-service
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/post_service
    depends_on: *default-service-deps
    ports:
      - "4004:4004"

  timeline-service:
    profiles: ["apps"]
    build:
      context: .
      dockerfile: ./apps/timeline-service/Dockerfile
    container_name: x-clone-timeline-service
    restart: unless-stopped
    environment:
      <<: *default-service-env
      PORT: 4005
      SERVICE_NAME: timeline-service
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/timeline_service
    depends_on: *default-service-deps
    ports:
      - "4005:4005"

  notification-service:
    profiles: ["apps"]
    build:
      context: .
      dockerfile: ./apps/notification-service/Dockerfile
    container_name: x-clone-notification-service
    restart: unless-stopped
    environment:
      <<: *default-service-env
      PORT: 4006
      SERVICE_NAME: notification-service
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/notification_service
    depends_on: *default-service-deps
    ports:
      - "4006:4006"

  search-service:
    profiles: ["apps"]
    build:
      context: .
      dockerfile: ./apps/search-service/Dockerfile
    container_name: x-clone-search-service
    restart: unless-stopped
    environment:
      <<: *default-service-env
      PORT: 4007
      SERVICE_NAME: search-service
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/search_service
    depends_on: *default-service-deps
    ports:
      - "4007:4007"

  admin-service:
    profiles: ["apps"]
    build:
      context: .
      dockerfile: ./apps/admin-service/Dockerfile
    container_name: x-clone-admin-service
    restart: unless-stopped
    environment:
      <<: *default-service-env
      PORT: 4008
      SERVICE_NAME: admin-service
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/admin_service
    depends_on: *default-service-deps
    ports:
      - "4008:4008"

  media-service:
    profiles: ["apps"]
    build:
      context: .
      dockerfile: ./apps/media-service/Dockerfile
    container_name: x-clone-media-service
    restart: unless-stopped
    environment:
      <<: *default-service-env
      PORT: 4009
      SERVICE_NAME: media-service
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/media_service
    depends_on: *default-service-deps
    ports:
      - "4009:4009"

  dashboard:
    profiles: ["apps"]
    build:
      context: .
      dockerfile: ./apps/dashboard/Dockerfile
    container_name: x-clone-dashboard
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:4000
    depends_on:
      api-gateway:
        condition: service_started
    ports:
      - "5173:5173"

  media-worker-go:
    profiles: ["apps"]
    build:
      context: .
      dockerfile: ./services/media-worker-go/Dockerfile
    container_name: x-clone-media-worker-go
    restart: unless-stopped
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio123
      S3_BUCKET: x-clone-dev
    depends_on: *default-service-deps

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
  opensearch_data:
